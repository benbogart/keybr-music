name: Deploy Cloud Run

on:
  push:
    branches:
      - main
      - cursor/BEN-27-ci-cd-cloud-run-deployment-8107
  workflow_dispatch:

concurrency:
  group: deploy-cloud-run-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME }}
      APP_URL: ${{ vars.APP_URL }}
      COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
      LITESTREAM_REPLICA_URI: ${{ vars.LITESTREAM_REPLICA_URI }}
      LITESTREAM_RETENTION: ${{ vars.LITESTREAM_RETENTION }}
      CLOUD_RUN_EXTRA_ENV_VARS: ${{ vars.CLOUD_RUN_EXTRA_ENV_VARS }}
      CLOUD_RUN_SECRETS: ${{ vars.CLOUD_RUN_SECRETS }}
      RUN_CLOUD_RUN_SMOKE_TEST: ${{ vars.RUN_CLOUD_RUN_SMOKE_TEST || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate auth configuration
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [[ -z "${GCP_SA_KEY}" ]]; then
            echo "Missing required GitHub secret: GCP_SA_KEY" >&2
            echo "Set this in Settings -> Secrets and variables -> Actions -> Secrets." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Validate deploy configuration
        run: |
          required_vars=(
            GCP_PROJECT_ID
            GCP_REGION
            GAR_REPOSITORY
            CLOUD_RUN_SERVICE
            APP_URL
            COOKIE_DOMAIN
            LITESTREAM_REPLICA_URI
          )

          for variable in "${required_vars[@]}"; do
            if [[ -z "${!variable}" ]]; then
              echo "Missing required GitHub repository variable: ${variable}" >&2
              exit 1
            fi
          done

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: image
        run: |
          image_name="${IMAGE_NAME:-keybr-com}"
          image_uri="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/${image_name}:${GITHUB_SHA}"
          docker build --tag "${image_uri}" .
          docker push "${image_uri}"
          echo "image_uri=${image_uri}" >> "${GITHUB_OUTPUT}"

      - name: Deploy to Cloud Run
        run: |
          base_env_vars="NODE_ENV=production,SERVER_PORT=3000,APP_URL=${APP_URL},COOKIE_DOMAIN=${COOKIE_DOMAIN},COOKIE_SECURE=true,DATABASE_CLIENT=sqlite,DATA_DIR=/var/lib/keybr,DATABASE_FILENAME=/var/lib/keybr/database.sqlite,LITESTREAM_REPLICA_URI=${LITESTREAM_REPLICA_URI}"
          if [[ -n "${LITESTREAM_RETENTION}" ]]; then
            base_env_vars="${base_env_vars},LITESTREAM_RETENTION=${LITESTREAM_RETENTION}"
          fi

          args=(
            "${CLOUD_RUN_SERVICE}"
            "--project=${GCP_PROJECT_ID}"
            "--region=${GCP_REGION}"
            "--platform=managed"
            "--allow-unauthenticated"
            "--port=3000"
            "--max-instances=1"
            "--image=${{ steps.image.outputs.image_uri }}"
            "--set-env-vars=${base_env_vars}"
          )

          if [[ -n "${CLOUD_RUN_EXTRA_ENV_VARS}" ]]; then
            args+=("--update-env-vars=${CLOUD_RUN_EXTRA_ENV_VARS}")
          fi

          if [[ -n "${CLOUD_RUN_SECRETS}" ]]; then
            args+=("--set-secrets=${CLOUD_RUN_SECRETS}")
          fi

          gcloud run deploy "${args[@]}"

      - name: Smoke test deployed service
        if: ${{ env.RUN_CLOUD_RUN_SMOKE_TEST == 'true' }}
        run: ./scripts/cloud-run-smoke-test.sh
